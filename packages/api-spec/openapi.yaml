openapi: 3.1.0
info:
  title: AgentPress API
  version: 0.0.1
  description: Minimal AI pipeline builder for generating and publishing blog content

servers:
  - url: http://localhost:3001

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          {}

    User:
      type: object
      required: [id, email, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SyncResult:
      type: object
      required: [research, pipelines]
      properties:
        research:
          type: object
          required: [checked, newItems, results]
          properties:
            checked:
              type: integer
            newItems:
              type: integer
            results:
              type: array
              items:
                type: object
                required: [sourceName, sourceId, newItem]
                properties:
                  sourceName:
                    type: string
                  sourceId:
                    type: string
                  newItem:
                    type: boolean
                  updatedCount:
                    type: integer
                  itemTitle:
                    type: string
                  statusMessage:
                    type: string
                  error:
                    type: string
        pipelines:
          type: object
          required: [started, skipped, results]
          properties:
            started:
              type: integer
            skipped:
              type: integer
            results:
              type: array
              items:
                type: object
                required: [pipelineName, pipelineId, status]
                properties:
                  pipelineName:
                    type: string
                  pipelineId:
                    type: string
                  status:
                    type: string
                    enum: [started, skipped]
                  runId:
                    type: string
                  reason:
                    type: string

    PipelineSetup:
      type: object
      required: [dryRun]
      properties:
        destinationId:
          type: string
          nullable: true
        dryRun:
          type: boolean

    PipelineVariable:
      type: object
      required: [id, pipelineId, key, type, required, sortOrder]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, long_text, number, boolean, json]
        required:
          type: boolean
        defaultValue:
          {}
        exampleValue:
          {}
        sortOrder:
          type: integer

    PipelineVariableInput:
      type: object
      required: [key, type, required, sortOrder]
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, long_text, number, boolean, json]
        required:
          type: boolean
        defaultValue:
          {}
        exampleValue:
          {}
        sortOrder:
          type: integer

    PipelineAgent:
      type: object
      required: [id, pipelineId, uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, enabled, sortOrder]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
          enum: [title, excerpt, thumbnail_prompt, thumbnail, body, image, none]
        outputFormat:
          type: string
          enum: [text, markdown, json, image, static]
        imageMode:
          type: string
          enum: [generate, selected, none]
        selectedImageAssetId:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer

    PipelineAgentInput:
      type: object
      required: [uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, enabled, sortOrder]
      properties:
        id:
          type: string
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
          enum: [title, excerpt, thumbnail_prompt, thumbnail, body, image, none]
        outputFormat:
          type: string
          enum: [text, markdown, json, image, static]
        imageMode:
          type: string
          enum: [generate, selected, none]
        selectedImageAssetId:
          type: string
          nullable: true
        enabled:
          type: boolean
        sortOrder:
          type: integer

    Pipeline:
      type: object
      required: [id, name, slug, status, dryRun, variables, agents, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [draft, active, paused, archived]
        visibility:
          type: string
          enum: [PRIVATE, PUBLIC]
        destinationId:
          type: string
          nullable: true
        wpCategoryIds:
          type: array
          items:
            type: integer
        bodyComposer:
          type: array
          items:
            type: object
            additionalProperties: true
        dryRun:
          type: boolean
        variables:
          type: array
          items:
            $ref: '#/components/schemas/PipelineVariable'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/PipelineAgent'
        loop:
          $ref: '#/components/schemas/PipelineLoop'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImageAsset:
      type: object
      required: [id, prompt, provider, model, path, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        agentId:
          type: string
        agentUid:
          type: string
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        size:
          type: string
        path:
          type: string
        url:
          type: string
        status:
          type: string
          enum: [ready, failed]
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PipelineSummary:
      type: object
      required: [id, name, slug, status, agentCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [draft, active, paused, archived]
        agentCount:
          type: integer
        lastRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GeneratedPost:
      type: object
      required: [title, excerpt, body]
      properties:
        title:
          type: string
        excerpt:
          type: string
        thumbnailPrompt:
          type: string
        thumbnailStatus:
          type: string
          enum: [generating, done, failed]
        thumbnailUrl:
          type: string
        thumbnailLocalPath:
          type: string
        body:
          type: string

    AgentRun:
      type: object
      required: [id, pipelineRunId, agentUid, agentName, outputTarget, renderedSystemPrompt, renderedUserPrompt, status, sortOrder]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        agentUid:
          type: string
        agentName:
          type: string
        outputTarget:
          type: string
        renderedSystemPrompt:
          type: string
        renderedUserPrompt:
          type: string
        inputHash:
          type: string
        cacheStatus:
          type: string
          enum: [generated, reused, failed]
        reusedFromAgentRunId:
          type: string
        outputText:
          type: string
        outputJson:
          {}
        status:
          type: string
          enum: [queued, running, completed, failed]
        error:
          type: string
        sortOrder:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    RunAsset:
      type: object
      required: [id, pipelineRunId, type, label, filename, path, createdAt]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        type:
          type: string
          enum: [text, json, image, html]
        label:
          type: string
        filename:
          type: string
        path:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time

    PublishAttempt:
      type: object
      required: [id, pipelineRunId, destinationId, status, createdAt]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        destinationId:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        remotePostId:
          type: string
        remoteUrl:
          type: string
        error:
          type: string
        progressMessage:
          type: string
        createdAt:
          type: string
          format: date-time

    PipelineRun:
      type: object
      required: [id, pipelineId, status, dryRun, variables, startedAt]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, posted]
        dryRun:
          type: boolean
        variables:
          type: object
          additionalProperties: true
        generatedPost:
          $ref: '#/components/schemas/GeneratedPost'
        outputFolder:
          type: string
        destinationId:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        error:
          type: string
        batchId:
          type: string
        loopIndex:
          type: integer

    PipelineLoop:
      type: object
      required: [id, pipelineId, loopType, cursorMode, maxBatchSize, createdAt, updatedAt]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        loopType:
          type: string
          enum: [research_feed]
        sourceId:
          type: string
        sourceName:
          type: string
        cursorMode:
          type: string
          enum: [all_stored, new_since_cursor, date_range]
        cursorAt:
          type: string
          format: date-time
        dateRangeStart:
          type: string
          format: date-time
        dateRangeEnd:
          type: string
          format: date-time
        variableMap:
          type: object
          additionalProperties:
            type: string
        maxBatchSize:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BatchPreview:
      type: object
      required: [itemCount, agentCount, estimatedCalls, capped, maxBatchSize, items]
      properties:
        itemCount:
          type: integer
        agentCount:
          type: integer
        estimatedCalls:
          type: integer
        capped:
          type: boolean
        maxBatchSize:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [itemId, title, publishedAt]
            properties:
              itemId:
                type: string
              title:
                type: string
              publishedAt:
                type: string
                format: date-time

    PipelineRunBatch:
      type: object
      required: [id, pipelineId, loopType, status, totalCount, completedCount, failedCount, skippedCount, dryRun, createdAt]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        label:
          type: string
        loopType:
          type: string
          enum: [research_feed]
        sourceId:
          type: string
        sourceName:
          type: string
        cursorMode:
          type: string
          enum: [all_stored, new_since_cursor, date_range]
        dryRun:
          type: boolean
        status:
          type: string
          enum: [queued, running, completed, completed_with_failures, failed, cancelled]
        totalCount:
          type: integer
        completedCount:
          type: integer
        failedCount:
          type: integer
        skippedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        runs:
          type: array
          items:
            $ref: '#/components/schemas/BatchRunSummary'

    BatchRunSummary:
      type: object
      required: [id, status, dryRun, loopIndex, startedAt]
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, posted]
        dryRun:
          type: boolean
        loopIndex:
          type: integer
        pinnedItemTitle:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        error:
          type: string

    RunSummary:
      type: object
      required: [id, pipelineId, pipelineName, pipelineSlug, status, dryRun, startedAt, hasPost, variables, agentCount, assetCount]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        pipelineName:
          type: string
        pipelineSlug:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, posted]
        dryRun:
          type: boolean
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        error:
          type: string
        hasPost:
          type: boolean
        postTitle:
          type: string
        destinationId:
          type: string
        variables:
          type: object
          additionalProperties: true
        agentCount:
          type: integer
        assetCount:
          type: integer

    Destination:
      type: object
      required: [id, type, name, siteUrl, authType, defaultStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [wordpress]
        name:
          type: string
        siteUrl:
          type: string
        authType:
          type: string
          enum: [application_password, token]
        username:
          type: string
        defaultStatus:
          type: string
          enum: [draft, publish]
        defaultCategoryIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WordPressCategory:
      type: object
      required: [id, name, slug, parent, count]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parent:
          type: integer
        count:
          type: integer

    PipelineValidationIssue:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          enum: [error, warning]
        message:
          type: string
        path:
          type: string

    LibraryAgent:
      type: object
      required: [id, uid, name, category, tags, systemPrompt, userPrompt, outputTarget, outputFormat, promptHash, usageCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        uid:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
        outputFormat:
          type: string
        promptHash:
          type: string
        usageCount:
          type: integer
        sourceRunId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateVariable:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, boolean]
        required:
          type: boolean
        defaultValue:
          type: string
        exampleValue:
          type: string
        hint:
          type: string

    TemplateAgent:
      type: object
      required: [uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, sortOrder]
      properties:
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
        outputFormat:
          type: string
        sortOrder:
          type: integer

    ContentTemplate:
      type: object
      required: [id, name, description, category, categoryLabel, tags, variables, agents]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        tags:
          type: array
          items:
            type: string
        variables:
          type: array
          items:
            $ref: '#/components/schemas/TemplateVariable'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/TemplateAgent'

    PackVariable:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, boolean]
        required:
          type: boolean
        defaultValue:
          type: string
        exampleValue:
          type: string
        hint:
          type: string

    VariablePack:
      type: object
      required: [id, name, description, category, categoryLabel, variables]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        variables:
          type: array
          items:
            $ref: '#/components/schemas/PackVariable'

    ResearchSource:
      type: object
      required: [id, name, slug, sourceType, sourceUrl, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        sourceType:
          type: string
          enum: [youtube, reddit, rss]
        sourceUrl:
          type: string
        externalId:
          type: string
        status:
          type: string
          enum: [active, paused]
        visibility:
          type: string
          enum: [PRIVATE, PUBLIC]
        lastChecked:
          type: string
          format: date-time
        defaultSummaryPromptId:
          type: string
          nullable: true
        defaultSummaryPromptName:
          type: string
          nullable: true
        pipelineSummaryPromptId:
          type: string
        pipelineSummaryPromptName:
          type: string
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResearchCheckLatest:
      type: object
      required: [id, title, contentStatus, hasTranscript, isNew, contentChecked]
      properties:
        id:
          type: string
        title:
          type: string
        contentStatus:
          type: string
          enum: [ok, disabled, unavailable, rate_limited, error]
        contentErrorReason:
          type: string
          nullable: true
        hasTranscript:
          type: boolean
        isNew:
          type: boolean
        contentChecked:
          type: boolean

    ResearchCheckResult:
      type: object
      required: [checked, newItem, newCount, updatedCount]
      properties:
        checked:
          type: boolean
        newItem:
          type: boolean
        newCount:
          type: integer
        updatedCount:
          type: integer
        item:
          $ref: '#/components/schemas/ResearchItem'
        latest:
          $ref: '#/components/schemas/ResearchCheckLatest'
        message:
          type: string

    ResearchBatchCheckItem:
      type: object
      required: [sourceId, sourceName, status, newCount, updatedCount]
      properties:
        sourceId:
          type: string
        sourceName:
          type: string
        status:
          type: string
          enum: [completed, failed]
        newCount:
          type: integer
        updatedCount:
          type: integer
        message:
          type: string
        error:
          type: string

    ResearchBatchCheckResult:
      type: object
      required: [checked, succeeded, failed, newCount, updatedCount, results]
      properties:
        category:
          type: string
        checked:
          type: integer
        succeeded:
          type: integer
        failed:
          type: integer
        newCount:
          type: integer
        updatedCount:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/ResearchBatchCheckItem'

    ResearchItem:
      type: object
      required: [id, sourceId, externalId, title, itemUrl, publishedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        sourceId:
          type: string
        externalId:
          type: string
        title:
          type: string
        itemUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        content:
          type: string
        contentStatus:
          type: string
          enum: [ok, disabled, unavailable, rate_limited, error]
        contentErrorReason:
          type: string
        contentCheckedAt:
          type: string
          format: date-time
        summaryCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SummaryPrompt:
      type: object
      required: [id, name, systemPrompt, userPrompt, isDefault, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Prompt:
      type: object
      required: [id, slug, name, kind, category, tags, systemPrompt, userPrompt, visibility, promptHash, usageCount, sortOrder, isDefault, createdAt, updatedAt]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [TRANSFORMATIONAL, CONTENT]
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        uid:
          type: string
        outputTarget:
          type: string
        outputFormat:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, PUBLIC]
        workspaceId:
          type: string
        promptHash:
          type: string
        usageCount:
          type: integer
        sortOrder:
          type: integer
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResearchSummary:
      type: object
      required: [id, itemId, promptId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        itemId:
          type: string
        promptId:
          type: string
        promptName:
          type: string
        promptDescription:
          type: string
        text:
          type: string
        status:
          type: string
          enum: [pending, processing, done, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NavigationPipeline:
      type: object
      required: [id, name, slug, status]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string }
        lastRunAt: { type: string, format: date-time }
        lastRunStatus: { type: string }

    NavigationSchedule:
      type: object
      required: [id, name, enabled]
      properties:
        id: { type: string }
        name: { type: string }
        enabled: { type: boolean }
        nextRunAt: { type: string, format: date-time }
        lastExecutionAt: { type: string, format: date-time }
        lastExecutionStatus: { type: string }

    NavigationResearchSource:
      type: object
      required: [id, name, slug, status]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string }
        lastCheckedAt: { type: string, format: date-time }

    NavigationDestination:
      type: object
      required: [id, name, type]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }

    NavigationData:
      type: object
      required: [pipelines, schedules, researchSources, destinations]
      properties:
        pipelines:
          type: array
          items: { $ref: '#/components/schemas/NavigationPipeline' }
        schedules:
          type: array
          items: { $ref: '#/components/schemas/NavigationSchedule' }
        researchSources:
          type: array
          items: { $ref: '#/components/schemas/NavigationResearchSource' }
        destinations:
          type: array
          items: { $ref: '#/components/schemas/NavigationDestination' }

    ScheduleActionInput:
      type: object
      required: [pipelineId, triggerPolicy]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        triggerPolicy:
          type: string
          enum: [always, any_checked_feed_new, selected_feeds_new]
        triggerSourceIds:
          type: array
          items:
            type: string
        variableOverrides:
          type: object
          additionalProperties: true

    ScheduleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        enabled:
          type: boolean
        cadenceType:
          type: string
          enum: [manual, hourly, daily, weekly, monthly]
        timezone:
          type: string
        minuteOfHour:
          type: integer
          nullable: true
        timeOfDay:
          type: string
          nullable: true
        dayOfWeek:
          type: integer
          nullable: true
        dayOfMonth:
          type: integer
          nullable: true
        sourceIds:
          type: array
          items:
            type: string
        pipelineActions:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleActionInput'

    SchedulePipelineAction:
      type: object
      required: [id, pipelineId, pipelineName, pipelineStatus, dryRun, triggerPolicy, triggerSourceIds, variableOverrides, pipelineVariables]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        pipelineName:
          type: string
        pipelineStatus:
          type: string
        dryRun:
          type: boolean
        destinationId:
          type: string
        triggerPolicy:
          type: string
          enum: [always, any_checked_feed_new, selected_feeds_new]
        triggerSourceIds:
          type: array
          items:
            type: string
        variableOverrides:
          type: object
          additionalProperties: true
        pipelineVariables:
          type: array
          items:
            $ref: '#/components/schemas/PipelineVariable'

    Schedule:
      type: object
      required: [id, name, enabled, cadenceType, timezone, sourceIds, sources, pipelineActions, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        cadenceType:
          type: string
          enum: [manual, hourly, daily, weekly, monthly]
        timezone:
          type: string
        minuteOfHour:
          type: integer
        timeOfDay:
          type: string
        dayOfWeek:
          type: integer
        dayOfMonth:
          type: integer
        nextRunAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        sourceIds:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ResearchSource'
        pipelineActions:
          type: array
          items:
            $ref: '#/components/schemas/SchedulePipelineAction'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScheduleSummary:
      type: object
      required: [id, name, enabled, cadenceType, timezone, sourceCount, pipelineCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        cadenceType:
          type: string
        timezone:
          type: string
        nextRunAt:
          type: string
          format: date-time
        lastRunAt:
          type: string
          format: date-time
        sourceCount:
          type: integer
        pipelineCount:
          type: integer
        lastExecutionStatus:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScheduleResearchCheck:
      type: object
      required: [id, sourceName, status, newCount, updatedCount]
      properties:
        id:
          type: string
        sourceId:
          type: string
        sourceName:
          type: string
        status:
          type: string
        newCount:
          type: integer
        updatedCount:
          type: integer
        error:
          type: string

    SchedulePipelineExecution:
      type: object
      required: [id, pipelineId, pipelineName, status, eligibleItemIds, pinnedItemIds, pinnedItems]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        pipelineName:
          type: string
        status:
          type: string
        reason:
          type: string
        eligibleItemIds:
          type: object
          additionalProperties: true
        pinnedItemIds:
          type: object
          additionalProperties: true
        pinnedItems:
          type: array
          items:
            type: object
            required: [sourceId, itemId, title]
            properties:
              sourceId:
                type: string
              itemId:
                type: string
              title:
                type: string
        pipelineRunId:
          type: string
        pipelineRunStatus:
          type: string

    ScheduleExecution:
      type: object
      required: [id, scheduleId, origin, status, createdAt, researchChecks, pipelineExecutions]
      properties:
        id:
          type: string
        scheduleId:
          type: string
        origin:
          type: string
          enum: [manual, timer]
        status:
          type: string
        scheduledFor:
          type: string
          format: date-time
        cutoffAt:
          type: string
          format: date-time
        skipReason:
          type: string
        error:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        researchChecks:
          type: array
          items:
            $ref: '#/components/schemas/ScheduleResearchCheck'
        pipelineExecutions:
          type: array
          items:
            $ref: '#/components/schemas/SchedulePipelineExecution'

paths:
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '409':
          description: Email already registered

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated

    patch:
      operationId: updateCurrentUser
      tags: [auth]
      summary: Update current user profile or change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
        '401':
          description: Current password incorrect

  /api/workspaces:
    get:
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      responses:
        '200': { description: Workspaces available to the current user }
    post:
      operationId: createTeamWorkspace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1 }
      responses:
        '201': { description: Team workspace created }

  /api/workspaces/{workspaceId}/members:
    parameters:
      - in: path
        name: workspaceId
        required: true
        schema: { type: string }
    get:
      operationId: listWorkspaceMembers
      security:
        - bearerAuth: []
      responses:
        '200': { description: Workspace members }
    post:
      operationId: addWorkspaceMember
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [ADMIN, EDITOR, VIEWER] }
      responses:
        '201': { description: Workspace member added }

  /api/workspaces/{workspaceId}/members/{userId}:
    parameters:
      - in: path
        name: workspaceId
        required: true
        schema: { type: string }
      - in: path
        name: userId
        required: true
        schema: { type: string }
    patch:
      operationId: updateWorkspaceMember
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [ADMIN, EDITOR, VIEWER] }
      responses:
        '200': { description: Workspace member updated }
    delete:
      operationId: removeWorkspaceMember
      security:
        - bearerAuth: []
      responses:
        '200': { description: Workspace member removed }

  /api/community/pipelines:
    get:
      operationId: listCommunityPipelines
      security: []
      responses:
        '200': { description: Public pipeline catalog }

  /api/community/pipelines/{pipelineId}/fork:
    parameters:
      - in: path
        name: pipelineId
        required: true
        schema: { type: string }
    post:
      operationId: forkCommunityPipeline
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '201': { description: Private pipeline fork created }

  /api/community/pipelines/{pipelineId}:
    parameters:
      - in: path
        name: pipelineId
        required: true
        schema: { type: string }
    get:
      operationId: getCommunityPipeline
      security: []
      responses:
        '200': { description: Public reusable pipeline definition }

  /api/community/feeds:
    get:
      operationId: listCommunityFeeds
      security: []
      responses:
        '200': { description: Public feed catalog }

  /api/community/feeds/{sourceId}/subscribe:
    parameters:
      - in: path
        name: sourceId
        required: true
        schema: { type: string }
    post:
      operationId: subscribeCommunityFeed
      security:
        - bearerAuth: []
      responses:
        '201': { description: Feed subscribed to the active workspace }

  /api/community/feeds/{sourceId}:
    parameters:
      - in: path
        name: sourceId
        required: true
        schema: { type: string }
    get:
      operationId: getCommunityFeed
      security: []
      responses:
        '200': { description: Public feed metadata and recent item metadata }

  /api/accounts/navigation:
    get:
      operationId: listAccountNavigation
      tags: [accounts]
      summary: Get compact global resources for navigation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Global navigation data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationData'

  /api/sync:
    post:
      operationId: syncAccount
      tags: [accounts]
      summary: Check all active research feeds and run all ready pipelines
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SyncResult'

  /api/pipelines:
    get:
      operationId: listPipelines
      tags: [pipelines]
      summary: List all pipelines
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pipeline list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineSummary'

    post:
      operationId: createPipeline
      tags: [pipelines]
      summary: Create a pipeline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                visibility:
                  type: string
                  enum: [PRIVATE, PUBLIC]
      responses:
        '201':
          description: Pipeline created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Pipeline'

  /api/pipelines/{pipelineId}:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getPipeline
      tags: [pipelines]
      summary: Get pipeline with variables, agents, and recent runs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pipeline
          content:
            application/json:
              schema:
                type: object
                required: [data, recentRuns]
                properties:
                  data:
                    $ref: '#/components/schemas/Pipeline'
                  recentRuns:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineRun'
        '404':
          description: Not found

    patch:
      operationId: updatePipeline
      tags: [pipelines]
      summary: Update pipeline (name, setup, variables, agents)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [draft, active, paused, archived]
                visibility:
                  type: string
                  enum: [PRIVATE, PUBLIC]
                destinationId:
                  type: string
                  nullable: true
                wpCategoryIds:
                  type: array
                  nullable: true
                  items:
                    type: integer
                bodyComposer:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                dryRun:
                  type: boolean
                forceRegenerate:
                  type: boolean
                forceRegenerateAgentUids:
                  type: array
                  items:
                    type: string
                variables:
                  type: array
                  items:
                    $ref: '#/components/schemas/PipelineVariableInput'
                agents:
                  type: array
                  items:
                    $ref: '#/components/schemas/PipelineAgentInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Pipeline'

    delete:
      operationId: deletePipeline
      tags: [pipelines]
      summary: Delete a pipeline
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/pipelines/{pipelineId}/validate:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: validatePipeline
      tags: [pipelines]
      summary: Validate pipeline before run
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [valid, errors, warnings]
                    properties:
                      valid:
                        type: boolean
                      errors:
                        type: array
                        items:
                          $ref: '#/components/schemas/PipelineValidationIssue'
                      warnings:
                        type: array
                        items:
                          $ref: '#/components/schemas/PipelineValidationIssue'

  /api/pipelines/{pipelineId}/loop:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string } }
    get:
      operationId: getPipelineLoop
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pipeline loop configuration
          content: { application/json: { schema: { type: object, properties: { data: { $ref: '#/components/schemas/PipelineLoop', nullable: true } } } } }
    put:
      operationId: upsertPipelineLoop
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loopType, cursorMode]
              properties:
                loopType: { type: string, enum: [research_feed] }
                sourceId: { type: string }
                cursorMode: { type: string, enum: [all_stored, new_since_cursor, date_range] }
                cursorAt: { type: string, format: date-time }
                dateRangeStart: { type: string, format: date-time }
                dateRangeEnd: { type: string, format: date-time }
                variableMap: { type: object, additionalProperties: { type: string } }
                maxBatchSize: { type: integer }
      responses:
        '200':
          description: Pipeline loop configuration
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { $ref: '#/components/schemas/PipelineLoop' } } } } }
    delete:
      operationId: deletePipelineLoop
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Pipeline loop deleted }

  /api/pipelines/{pipelineId}/batch/preview:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string } }
    post:
      operationId: previewPipelineBatch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content: { application/json: { schema: { type: object, properties: { cursorMode: { type: string, enum: [all_stored, new_since_cursor, date_range] }, dateRangeStart: { type: string }, dateRangeEnd: { type: string } } } } }
      responses:
        '200':
          description: Batch preview
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { $ref: '#/components/schemas/BatchPreview' } } } } }

  /api/pipelines/{pipelineId}/batch:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string } }
    post:
      operationId: startPipelineBatch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: false
        content: { application/json: { schema: { type: object, properties: { dryRun: { type: boolean }, cursorMode: { type: string, enum: [all_stored, new_since_cursor, date_range] }, dateRangeStart: { type: string }, dateRangeEnd: { type: string } } } } }
      responses:
        '201':
          description: Batch started
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { $ref: '#/components/schemas/PipelineRunBatch' } } } } }

  /api/pipelines/{pipelineId}/batches:
    parameters:
      - { name: pipelineId, in: path, required: true, schema: { type: string } }
    get:
      operationId: listPipelineBatches
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pipeline batches
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { type: array, items: { $ref: '#/components/schemas/PipelineRunBatch' } } } } } }

  /api/pipeline-batches/{batchId}:
    parameters:
      - { name: batchId, in: path, required: true, schema: { type: string } }
    get:
      operationId: getPipelineBatch
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Pipeline batch
          content: { application/json: { schema: { type: object, required: [data], properties: { data: { $ref: '#/components/schemas/PipelineRunBatch' } } } } }

  /api/pipelines/{pipelineId}/runs:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: startPipelineRun
      tags: [runs]
      summary: Start a pipeline run
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variables]
              properties:
                variables:
                  type: object
                  additionalProperties: true
                dryRun:
                  type: boolean
                title:
                  type: string
      responses:
        '201':
          description: Run started
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/PipelineRun'

  /api/pipelines/{pipelineId}/image-assets:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: listImageAssets
      tags: [image-assets]
      summary: List generated image assets for a pipeline
      security:
        - bearerAuth: []
      parameters:
        - name: agentId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Image assets
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImageAsset'

  /api/pipelines/{pipelineId}/image-assets/generate:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: generateImageAsset
      tags: [image-assets]
      summary: Generate an image asset for an image agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, prompt]
              properties:
                agentId:
                  type: string
                prompt:
                  type: string
      responses:
        '201':
          description: Generated image asset
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ImageAsset'

  /api/pipelines/{pipelineId}/image-assets/upload:
    parameters:
      - name: pipelineId
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: uploadImageAsset
      tags: [image-assets]
      summary: Upload an image asset for a static or image agent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agentId, dataBase64]
              properties:
                agentId:
                  type: string
                filename:
                  type: string
                dataBase64:
                  type: string
                label:
                  type: string
      responses:
        '201':
          description: Uploaded image asset
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/ImageAsset'

  /api/image-assets/{assetId}/file:
    parameters:
      - name: assetId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: downloadImageAsset
      tags: [image-assets]
      summary: Download image asset file
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Image file
          content:
            image/png:
              schema:
                type: string
                format: binary

  /api/pipeline-runs:
    get:
      operationId: listAllRuns
      tags: [runs]
      summary: List all pipeline runs across all pipelines, newest first
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunSummary'

  /api/pipeline-runs/{runId}:
    parameters:
