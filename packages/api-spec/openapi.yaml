openapi: 3.1.0
info:
  title: AgentPress API
  version: 0.0.1
  description: Minimal AI pipeline builder for generating and publishing blog content

servers:
  - url: http://localhost:3001

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string
        details:
          {}

    User:
      type: object
      required: [id, email, role, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountSummary:
      type: object
      required: [id, name, slug, pipelineCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        phone:
          type: string
        email:
          type: string
        description:
          type: string
        pipelineCount:
          type: integer
        lastRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SyncResult:
      type: object
      required: [research, pipelines]
      properties:
        research:
          type: object
          required: [checked, newItems, results]
          properties:
            checked:
              type: integer
            newItems:
              type: integer
            results:
              type: array
              items:
                type: object
                required: [sourceName, sourceId, newItem]
                properties:
                  sourceName:
                    type: string
                  sourceId:
                    type: string
                  newItem:
                    type: boolean
                  updatedCount:
                    type: integer
                  itemTitle:
                    type: string
                  statusMessage:
                    type: string
                  error:
                    type: string
        pipelines:
          type: object
          required: [started, skipped, results]
          properties:
            started:
              type: integer
            skipped:
              type: integer
            results:
              type: array
              items:
                type: object
                required: [pipelineName, pipelineId, status]
                properties:
                  pipelineName:
                    type: string
                  pipelineId:
                    type: string
                  status:
                    type: string
                    enum: [started, skipped]
                  runId:
                    type: string
                  reason:
                    type: string

    Account:
      type: object
      required: [id, name, slug, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        phone:
          type: string
        email:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PipelineSetup:
      type: object
      required: [dryRun, scheduleMode, isPaused]
      properties:
        destinationId:
          type: string
          nullable: true
        dryRun:
          type: boolean
        scheduleMode:
          type: string
          enum: [manual, recurring]
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        timeOfDay:
          type: string
        timezone:
          type: string
        isPaused:
          type: boolean

    PipelineVariable:
      type: object
      required: [id, pipelineId, key, type, required, sortOrder]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, long_text, number, boolean, json]
        required:
          type: boolean
        defaultValue:
          {}
        exampleValue:
          {}
        sortOrder:
          type: integer

    PipelineVariableInput:
      type: object
      required: [key, type, required, sortOrder]
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, long_text, number, boolean, json]
        required:
          type: boolean
        defaultValue:
          {}
        exampleValue:
          {}
        sortOrder:
          type: integer

    PipelineAgent:
      type: object
      required: [id, pipelineId, uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, enabled, sortOrder]
      properties:
        id:
          type: string
        pipelineId:
          type: string
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
          enum: [title, excerpt, thumbnail_prompt, thumbnail, body, image, none]
        outputFormat:
          type: string
          enum: [text, markdown, json, image]
        imageMode:
          type: string
          enum: [generate, selected, none]
        selectedImageAssetId:
          type: string
        enabled:
          type: boolean
        sortOrder:
          type: integer

    PipelineAgentInput:
      type: object
      required: [uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, enabled, sortOrder]
      properties:
        id:
          type: string
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
          enum: [title, excerpt, thumbnail_prompt, thumbnail, body, image, none]
        outputFormat:
          type: string
          enum: [text, markdown, json, image]
        imageMode:
          type: string
          enum: [generate, selected, none]
        selectedImageAssetId:
          type: string
          nullable: true
        enabled:
          type: boolean
        sortOrder:
          type: integer

    Pipeline:
      type: object
      required: [id, accountId, name, slug, status, dryRun, scheduleMode, isPaused, variables, agents, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [draft, active, paused, archived]
        destinationId:
          type: string
          nullable: true
        wpCategoryIds:
          type: array
          items:
            type: integer
        bodyComposer:
          type: array
          items:
            type: object
            additionalProperties: true
        dryRun:
          type: boolean
        scheduleMode:
          type: string
          enum: [manual, recurring]
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        timeOfDay:
          type: string
        timezone:
          type: string
        isPaused:
          type: boolean
        variables:
          type: array
          items:
            $ref: '#/components/schemas/PipelineVariable'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/PipelineAgent'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ImageAsset:
      type: object
      required: [id, prompt, provider, model, path, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        pipelineId:
          type: string
        agentId:
          type: string
        agentUid:
          type: string
        prompt:
          type: string
        provider:
          type: string
        model:
          type: string
        size:
          type: string
        path:
          type: string
        url:
          type: string
        status:
          type: string
          enum: [ready, failed]
        error:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PipelineSummary:
      type: object
      required: [id, accountId, name, slug, status, agentCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [draft, active, paused, archived]
        agentCount:
          type: integer
        lastRunAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GeneratedPost:
      type: object
      required: [title, excerpt, body]
      properties:
        title:
          type: string
        excerpt:
          type: string
        thumbnailPrompt:
          type: string
        thumbnailStatus:
          type: string
          enum: [generating, done, failed]
        thumbnailUrl:
          type: string
        thumbnailLocalPath:
          type: string
        body:
          type: string

    AgentRun:
      type: object
      required: [id, pipelineRunId, agentUid, agentName, outputTarget, renderedSystemPrompt, renderedUserPrompt, status, sortOrder]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        agentUid:
          type: string
        agentName:
          type: string
        outputTarget:
          type: string
        renderedSystemPrompt:
          type: string
        renderedUserPrompt:
          type: string
        inputHash:
          type: string
        cacheStatus:
          type: string
          enum: [generated, reused, failed]
        reusedFromAgentRunId:
          type: string
        outputText:
          type: string
        outputJson:
          {}
        status:
          type: string
          enum: [queued, running, completed, failed]
        error:
          type: string
        sortOrder:
          type: integer
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    RunAsset:
      type: object
      required: [id, pipelineRunId, type, label, filename, path, createdAt]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        type:
          type: string
          enum: [text, json, image, html]
        label:
          type: string
        filename:
          type: string
        path:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time

    PublishAttempt:
      type: object
      required: [id, pipelineRunId, destinationId, status, createdAt]
      properties:
        id:
          type: string
        pipelineRunId:
          type: string
        destinationId:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        remotePostId:
          type: string
        remoteUrl:
          type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time

    PipelineRun:
      type: object
      required: [id, accountId, pipelineId, status, dryRun, variables, startedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        pipelineId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed, posted]
        dryRun:
          type: boolean
        variables:
          type: object
          additionalProperties: true
        generatedPost:
          $ref: '#/components/schemas/GeneratedPost'
        outputFolder:
          type: string
        destinationId:
          type: string
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        error:
          type: string

    Destination:
      type: object
      required: [id, accountId, type, name, siteUrl, authType, defaultStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        type:
          type: string
          enum: [wordpress]
        name:
          type: string
        siteUrl:
          type: string
        authType:
          type: string
          enum: [application_password, token]
        username:
          type: string
        defaultStatus:
          type: string
          enum: [draft, publish]
        defaultCategoryIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WordPressCategory:
      type: object
      required: [id, name, slug, parent, count]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parent:
          type: integer
        count:
          type: integer

    PipelineValidationIssue:
      type: object
      required: [level, message]
      properties:
        level:
          type: string
          enum: [error, warning]
        message:
          type: string
        path:
          type: string

    LibraryAgent:
      type: object
      required: [id, uid, name, category, tags, systemPrompt, userPrompt, outputTarget, outputFormat, promptHash, usageCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        uid:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
        outputFormat:
          type: string
        promptHash:
          type: string
        usageCount:
          type: integer
        sourceRunId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateVariable:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, boolean]
        required:
          type: boolean
        defaultValue:
          type: string
        exampleValue:
          type: string
        hint:
          type: string

    TemplateAgent:
      type: object
      required: [uid, name, systemPrompt, userPrompt, outputTarget, outputFormat, sortOrder]
      properties:
        uid:
          type: string
        name:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        outputTarget:
          type: string
        outputFormat:
          type: string
        sortOrder:
          type: integer

    ContentTemplate:
      type: object
      required: [id, name, description, category, categoryLabel, tags, variables, agents]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        tags:
          type: array
          items:
            type: string
        variables:
          type: array
          items:
            $ref: '#/components/schemas/TemplateVariable'
        agents:
          type: array
          items:
            $ref: '#/components/schemas/TemplateAgent'

    PackVariable:
      type: object
      required: [key, label, type, required]
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, boolean]
        required:
          type: boolean
        defaultValue:
          type: string
        exampleValue:
          type: string
        hint:
          type: string

    VariablePack:
      type: object
      required: [id, name, description, category, categoryLabel, variables]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        categoryLabel:
          type: string
        variables:
          type: array
          items:
            $ref: '#/components/schemas/PackVariable'

    ResearchSource:
      type: object
      required: [id, accountId, name, slug, sourceType, sourceUrl, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        sourceType:
          type: string
          enum: [youtube, reddit, rss]
        sourceUrl:
          type: string
        externalId:
          type: string
        status:
          type: string
          enum: [active, paused]
        lastChecked:
          type: string
          format: date-time
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResearchCheckLatest:
      type: object
      required: [id, title, contentStatus, hasTranscript, isNew, contentChecked]
      properties:
        id:
          type: string
        title:
          type: string
        contentStatus:
          type: string
          enum: [ok, disabled, unavailable, rate_limited, error]
        contentErrorReason:
          type: string
          nullable: true
        hasTranscript:
          type: boolean
        isNew:
          type: boolean
        contentChecked:
          type: boolean

    ResearchCheckResult:
      type: object
      required: [checked, newItem, newCount, updatedCount]
      properties:
        checked:
          type: boolean
        newItem:
          type: boolean
        newCount:
          type: integer
        updatedCount:
          type: integer
        item:
          $ref: '#/components/schemas/ResearchItem'
        latest:
          $ref: '#/components/schemas/ResearchCheckLatest'

    ResearchItem:
      type: object
      required: [id, sourceId, externalId, title, itemUrl, publishedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        sourceId:
          type: string
        externalId:
          type: string
        title:
          type: string
        itemUrl:
          type: string
        publishedAt:
          type: string
          format: date-time
        content:
          type: string
        contentStatus:
          type: string
          enum: [ok, disabled, unavailable, rate_limited, error]
        contentErrorReason:
          type: string
        contentCheckedAt:
          type: string
          format: date-time
        summaryCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SummaryPrompt:
      type: object
      required: [id, name, systemPrompt, userPrompt, isDefault, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        systemPrompt:
          type: string
        userPrompt:
          type: string
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ResearchSummary:
      type: object
      required: [id, itemId, promptId, status, createdAt, updatedAt]
      properties:
        id:
          type: string
        itemId:
          type: string
        promptId:
          type: string
        promptName:
          type: string
        promptDescription:
          type: string
        text:
          type: string
        status:
          type: string
          enum: [pending, processing, done, failed]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '409':
          description: Email already registered

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    nullable: true

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated

  /api/accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountSummary'

    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                category:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Account'

  /api/accounts/{accountId}:
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Account'
        '404':
          description: Not found

    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                category:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Account'

    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /api/accounts/{accountId}/sync:
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string

    post:
      operationId: syncAccount
      tags: [accounts]
      summary: Check all active research feeds and run all ready pipelines for an account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SyncResult'

  /api/accounts/{accountId}/pipelines:
    parameters:
      - name: accountId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: listPipelines
      tags: [pipelines]
      summary: List pipelines for an account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pipeline list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PipelineSummary'

    post:
      operationId: createPipeline
      tags: [pipelines]
      summary: Create a pipeline under an account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
